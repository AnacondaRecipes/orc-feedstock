{% set name = "orc" %}
{% set version = "2.2.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://archive.apache.org/dist/{{ name }}/{{ name }}-{{ version }}/{{ name }}-{{ version }}.tar.gz
  sha256: b15aca45a7e73ffbd1bbc36a78cd1422d41f07721092a25f43448e6e16f4763b
  patches:
    - patches/0001-Don-t-force-orc-to-be-a-static-library-let-end-user-.patch
    - patches/0002-Allow-user-to-override-path-to-protoc.patch
    # 0003 is https://github.com/apache/orc/pull/2316
    - patches/0003-add-missing-include-for-protobuf-types.patch
    # 0004 is https://github.com/apache/orc/pull/2345
    - patches/0004-v2.2.0-Windows-byteswap-rename.patch

build:
  number: 1
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake
    - ninja-base # [unix]
    # `protoc` is also used for building
    - libprotobuf {{ libprotobuf }}
  host:
    - zlib {{ zlib }}
    - snappy {{ snappy }}
    - libprotobuf {{ libprotobuf }}
    - libabseil {{ libabseil }} # [win] linked with orc.dll through libprotobuf dep.
    - lz4-c {{ lz4_c }}
    - zstd {{ zstd }}
  run:
    # through run exports
    - zlib        # 1.3.1
    - snappy      # 1.2.2
    - libprotobuf # 6.33.0
    - libabseil   # [win]
    - lz4-c       # 1.10.0
    - zstd        # 1.3.1
    - __osx >={{ MACOSX_DEPLOYMENT_TARGET }}  # [osx and x86_64]
    # orc >=2.0.1 will prefer $CONDA_PREFIX/share/zoneinfo for tzdb
    - tzdata

test:
  commands:
    # shared libraries
    - test -f $PREFIX/lib/liborc${SHLIB_EXT}  # [unix]
    - if not exist %LIBRARY_BIN%\orc.dll exit 1  # [win]
    # import library for the DLL
    - if not exist %LIBRARY_LIB%\orc.lib exit 1  # [win]
    # absence of static libraries
    - test ! -f $PREFIX/lib/liborc.a  # [not win]
    # headers
    - test -f $PREFIX/include/orc/Common.hh  # [unix]
    - if not exist %LIBRARY_INC%\orc\Common.hh exit 1  # [win]

about:
  home: https://orc.apache.org
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: C++ libraries for Apache ORC
  dev_url: https://github.com/apache/orc
  doc_url: https://github.com/apache/orc#readme
  description: The smallest, fastest columnar storage for Hadoop workloads.

extra:
  recipe-maintainers:
    - wesm
    - xhochy
    - nehaljwani
